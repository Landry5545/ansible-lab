---
- name: Install Docker and deploy test container
  hosts: managed
  become: yes

  tasks:
    - name: Install prerequisite packages
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: yes

    - name: Create keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Docker GPG key
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu noble stable"
        state: present
        filename: docker

    - name: Install Docker Engine and Compose plugin
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Ensure Docker service is enabled and running
      systemd:
        name: docker
        enabled: yes
        state: started

    - name: Add current user to docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes

    - name: Allow HTTP through UFW
      ufw:
        rule: allow
        port: '80'
        proto: tcp

    - name: Run nginx test container
      docker_container:
        name: test-nginx
        image: nginx:latest
        state: started
        restart_policy: always
        ports:
          - "80:80"

   - name: Install iptables-persistent
      apt:
        name: iptables-persistent
        state: present

    - name: Allow port 80 through DOCKER-USER chain
      iptables:
        chain: DOCKER-USER
        protocol: tcp
        destination_port: '80'
        jump: ACCEPT
        action: insert

    - name: Save iptables rules persistently
      command: netfilter-persistent save
